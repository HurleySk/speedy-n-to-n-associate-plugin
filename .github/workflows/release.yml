name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore and build
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      - name: Pack NuGet package
        run: dotnet pack --configuration Release --no-build

      - name: Push to NuGet
        run: dotnet nuget push bin\Release\*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Release/net48/SpeedyNtoNAssociatePlugin.dll
            bin/Release/net48/Microsoft.Data.Sqlite.dll
            bin/Release/net48/SQLitePCLRaw.batteries_v2.dll
            bin/Release/net48/SQLitePCLRaw.core.dll
            bin/Release/net48/SQLitePCLRaw.provider.dynamic_cdecl.dll
          generate_release_notes: true
